name: Build and deploy to Hostinger

# Chạy mỗi khi có thay đổi trên nhánh main (kể cả khi bạn bấm Publish trong /admin,
# vì Sveltia CMS commit vào GitHub). Cũng có thể chạy tay từ tab Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # Đẩy nội dung thư mục dist/ lên public_html của Hostinger qua FTP.
      # 3 giá trị FTP_* được đặt trong: GitHub repo -> Settings -> Secrets and
      # variables -> Actions -> New repository secret.
      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Bỏ qua các file không thuộc site để không xóa nhầm.
          exclude: |
            **/.git*
            **/.git*/**
